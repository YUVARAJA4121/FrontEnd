<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Layout</title>
    <link rel="stylesheet" href="day12.css">
</head>

<body>

    <div class="cards">

        <!-- Card 1 -->
        <div class="card">
            <div class="card-image">
                <img src="https://cdn.britannica.com/25/222725-050-170F622A/Indian-cricketer-Mahendra-Singh-Dhoni-2011.jpg"
                    alt="">
                <span class="badge">Cricketer</span>
            </div>

            <div class="card-body">
                <h3>Mahendra Singh Dhoni</h3>
                <p>Captain cool</p>
            </div>

            <div class="card-footer">
                <span>Keeper</span>
                <span>Farmer</span>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="card">
            <div class="card-image">
                <img src="https://img.ipl.com/upload/20251220/d507ae47dad783bc7e790a2a6152fd1f.jpg" alt="">
                <span class="badge">Cricketer</span>
            </div>

            <div class="card-body">
                <h3>Hardik pandya</h3>
                <p>All Rounder</p>
            </div>

            <div class="card-footer">
                <span>Batsman</span>
                <span>Bowler</span>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="card">
            <div class="card-image">
                <img src="https://skillcircle.in/wp-content/uploads/2024/10/Virat-Kohli-1024x1024.jpg" alt="">
                <span class="badge">Cricketer</span>
            </div>

            <div class="card-body">
                <h3>Virat Kohli</h3>
                <p>King Kholi</p>
            </div>

            <div class="card-footer">
                <span>no 1 Batsman</span>
                <span>best player</span>
            </div>
        </div>

    </div>

</body>

</html>
