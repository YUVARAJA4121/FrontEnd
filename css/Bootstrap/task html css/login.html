<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - FuelTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- FULL PAGE BLUE BACKGROUND -->
<div class="auth-bg">

  <!-- WHITE LOGIN BOX IN CENTER -->
  <div class="auth-box">

    <!-- Logo and title -->
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;">⛽</div>
      <h4 class="fw-bold" style="color:#1a237e;">Welcome Back!</h4>
      <p class="text-muted" style="font-size:0.9rem;">Login to your FuelTrack account</p>
    </div>

    <!-- Login Form -->
    <form action="dashboard.html" method="get">

      <div class="mb-3">
        <label class="form-label">📧 Email Address</label>
        <input type="email" class="form-control" placeholder="you@email.com" required />
      </div>

      <div class="mb-4">
        <label class="form-label">🔒 Password</label>
        <input type="password" class="form-control" placeholder="Min 8 characters" required minlength="8" />
      </div>

      <button type="submit" class="btn w-100 text-white fw-bold" style="background:#1a237e;">
        🔐 Login
      </button>

    </form>

    <!-- Link to register page -->
    <p class="text-center mt-3 mb-0" style="font-size:0.9rem;">
      Don't have an account? <a href="register.html" style="color:#1a237e; font-weight:600;">Register here</a>
    </p>

    <!-- Back to home -->
    <p class="text-center mt-2 mb-0" style="font-size:0.85rem;">
      <a href="index.html" style="color:#888;">← Back to Home</a>
    </p>

  </div>
</div>

</body>
</html>
