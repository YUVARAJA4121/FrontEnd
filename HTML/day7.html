<!DOCTYPE html>
<html>
<head>
<title>Form and Table Example</title>
</head>
<body>

<h2>Student Registration Form</h2>

<form>

<label>Name:</label><br>
<input type="text"><br><br>

<label>Email:</label><br>
<input type="email"><br><br>

<label>Course:</label><br>
<select>
<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
</select><br><br>

<label>Address:</label><br>
<textarea></textarea><br><br>

<button>Submit</button>

</form>

<br><br>

<h2>Student Details Table</h2>

<table border="1">

<tr>
<th>Name</th>
<th>Age</th>
<th>Course</th>
</tr>

<tr>
<td>Arun</td>
<td>20</td>
<td>HTML</td>
</tr>

<tr>
<td>Priya</td>
<td>21</td>
<td>CSS</td>
</tr>

<tr>
<td>Rahul</td>
<td>22</td>
<td>JavaScript</td>
</tr>

</table>

</body>
</html>
